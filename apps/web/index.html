<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FDF8F5" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>BabyPeek - See Your Baby's Face Before Birth | AI Ultrasound Prediction</title>
    <meta
      name="description"
      content="See your future baby before they arrive. Upload your 4D ultrasound for an AI baby face prediction in ~60 seconds. Free preview, HD $9.99. Private & secure."
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="BabyPeek - See Your Baby's Face Before Birth | AI Ultrasound Prediction"
    />
    <meta
      property="og:description"
      content="See your future baby before they arrive. Upload your 4D ultrasound for an AI baby face prediction in ~60 seconds. Free preview, HD $9.99. Private & secure."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://babypeek.io/" />
    <meta property="og:image" content="https://babypeek.io/og-image.png" />
    <meta property="og:image:alt" content="BabyPeek - AI baby portrait from ultrasound preview" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="BabyPeek" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="BabyPeek - See Your Baby's Face Before Birth | AI Ultrasound Prediction"
    />
    <meta
      name="twitter:description"
      content="See your future baby before they arrive. Upload your 4D ultrasound for an AI baby face prediction in ~60 seconds. Free preview, HD $9.99. Private & secure."
    />
    <meta name="twitter:image" content="https://babypeek.io/og-image.png" />
    <meta name="twitter:image:alt" content="BabyPeek - AI baby portrait from ultrasound preview" />

    <!-- Canonical -->
    <link rel="canonical" href="https://babypeek.io/" />

    <!-- Fonts: subset weights + non-blocking load (fallbacks in index.css @theme) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&amp;family=Outfit:wght@300;400;500;600;700&amp;display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&amp;family=Outfit:wght@300;400;500;600;700&amp;display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root">
      <style>
        #root .app-loading-shell {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
          background: linear-gradient(180deg, #fdf8f5 0%, #fffaf7 100%);
          font-family: "Outfit", system-ui, -apple-system, sans-serif;
          color: #2f2f2f;
          text-align: center;
        }
        #root .app-loading-card {
          max-width: 360px;
        }
        #root .app-loading-spinner {
          width: 40px;
          height: 40px;
          margin: 0 auto 16px;
          border-radius: 999px;
          border: 4px solid rgba(242, 109, 91, 0.2);
          border-top-color: #f26d5b;
          animation: app-loading-spin 0.9s linear infinite;
        }
        #root .app-loading-title {
          margin: 0;
          font-size: 1.125rem;
          font-weight: 600;
        }
        #root .app-loading-subtitle {
          margin: 8px 0 0;
          font-size: 0.9375rem;
          color: #5b5b5b;
        }
        @keyframes app-loading-spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
      <div class="app-loading-shell" role="status" aria-live="polite">
        <div class="app-loading-card">
          <div class="app-loading-spinner" aria-hidden="true"></div>
          <p class="app-loading-title">Loading BabyPeek...</p>
          <p class="app-loading-subtitle">Getting your portrait experience ready.</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
