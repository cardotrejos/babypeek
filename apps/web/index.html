<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FDF8F5" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>BabyPeek - See Your Baby's Face Before Birth | AI Ultrasound Portrait</title>
    <meta
      name="description"
      content="Upload your 4D ultrasound and get a realistic AI portrait of your baby in ~60 seconds. Free preview, HD download. Private & secure."
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="BabyPeek - See Your Baby's Face Before Birth"
    />
    <meta
      property="og:description"
      content="Upload your 4D ultrasound and get a realistic AI portrait of your baby in ~60 seconds. Free preview, HD download."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://babypeek.io/" />
    <meta property="og:image" content="https://babypeek.io/og-image.png" />
    <meta property="og:image:alt" content="BabyPeek - AI baby portrait from ultrasound preview" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="BabyPeek" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="BabyPeek - See Your Baby's Face Before Birth | AI Ultrasound Portrait"
    />
    <meta
      name="twitter:description"
      content="Upload your 4D ultrasound and get a realistic AI portrait of your baby in ~60 seconds. Free preview, HD download. Private & secure."
    />
    <meta name="twitter:image" content="https://babypeek.io/og-image.png" />
    <meta name="twitter:image:alt" content="BabyPeek - AI baby portrait from ultrasound preview" />

    <!-- Canonical -->
    <link rel="canonical" href="https://babypeek.io/" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Facebook Pixel - loads only if VITE_FACEBOOK_PIXEL_ID is set -->
    <script id="fb-pixel-loader">
      (function() {
        // Pixel ID is injected at build time by Vite
        var pixelId = '%VITE_FACEBOOK_PIXEL_ID%';

        // Only initialize if pixelId is set (not empty or placeholder)
        if (!pixelId || pixelId === '' || pixelId.indexOf('VITE_') === 0) {
          return;
        }

        // Facebook Pixel base code
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');

        fbq('init', pixelId);
        fbq('track', 'PageView');
      })();
    </script>
  </head>
  <body>
    <!-- Facebook Pixel noscript fallback -->
    <noscript>
      <img
        height="1"
        width="1"
        style="display:none"
        alt=""
        src="https://www.facebook.com/tr?id=%VITE_FACEBOOK_PIXEL_ID%&ev=PageView&noscript=1"
      />
    </noscript>
    <div id="root">
      <style>
        #root .app-loading-shell {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
          background: linear-gradient(180deg, #fdf8f5 0%, #fffaf7 100%);
          font-family: "DM Sans", system-ui, -apple-system, sans-serif;
          color: #2f2f2f;
          text-align: center;
        }
        #root .app-loading-card {
          max-width: 360px;
        }
        #root .app-loading-spinner {
          width: 40px;
          height: 40px;
          margin: 0 auto 16px;
          border-radius: 999px;
          border: 4px solid rgba(242, 109, 91, 0.2);
          border-top-color: #f26d5b;
          animation: app-loading-spin 0.9s linear infinite;
        }
        #root .app-loading-title {
          margin: 0;
          font-size: 1.125rem;
          font-weight: 600;
        }
        #root .app-loading-subtitle {
          margin: 8px 0 0;
          font-size: 0.9375rem;
          color: #5b5b5b;
        }
        @keyframes app-loading-spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
      <div class="app-loading-shell" role="status" aria-live="polite">
        <div class="app-loading-card">
          <div class="app-loading-spinner" aria-hidden="true"></div>
          <p class="app-loading-title">Loading BabyPeek...</p>
          <p class="app-loading-subtitle">Getting your portrait experience ready.</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
